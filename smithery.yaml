name: insurance-verification-mcp
description: AI-powered insurance verification MCP server for agents. Supports verify
  eligibility, prior authorization check, claim status. By MEOK AI Labs.
version: 1.0.0
tools:
- name: verify_eligibility
  description: Verify patient insurance eligibility including coverage dates and plan
    details.
  parameters:
  - name: patient_id
    type: string
    required: true
  - name: policy_number
    type: string
    required: true
  - name: procedure_code
    type: string
    required: true
- name: prior_authorization_check
  description: Check if a medical procedure requires prior authorization from the
    insurer.
  parameters:
  - name: diagnosis_code
    type: string
    required: true
  - name: treatment
    type: string
    required: true
- name: claim_status
  description: Check the status of an insurance claim including processing stage and
    expected dates.
  parameters:
  - name: claim_id
    type: string
    required: true
- name: fraud_indicators
  description: Analyze a claim for potential fraud indicators and risk scoring.
  parameters:
  - name: claim_data
    type: object
    required: true
